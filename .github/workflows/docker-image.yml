name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
      IMAGE_NAME: myapp

jobs:



  build:

    runs-on: ubuntu-latest
   
    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag aviraj3109/myapp:latest
    - name: List Docker Images
      run: docker images
    - name: Save Image
      run: |
          docker save \
          -o image.tar \
          aviraj3109/myapp:latest


    - name: Upload Image
      uses: actions/upload-artifact@v4
      with:
          name: docker-image
          path: image.tar
  push-image:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: Production
    steps:

      - name: Download Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Image
        run: |
          docker load -i image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: aviraj3109
          password: Docker@45

      - name: Push Image
        run: |
          docker push aviraj3109/myapp:latest
  
